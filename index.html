<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Battery Work Tracker</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <h1>🔋 Battery Work</h1>
        <p>Ώρες, λεπτά, μπαταρίες, πραγματικό και εικονικό 4ωρο.</p>
      </div>
      <button id="themeBtn" class="ghost" type="button">🌙 Dark</button>
    </header>

    <section class="card">
      <h2 id="formTitle">Νέα καταχώρηση</h2>
      <input type="hidden" id="editId">

      <label>Ημερομηνία
        <input id="date" type="date" required>
      </label>

      <div class="grid2">
        <label>Ώρες
          <input id="hours" type="number" min="0" step="1" inputmode="numeric" placeholder="π.χ. 2">
        </label>
        <label>Λεπτά
          <input id="minutes" type="number" min="0" max="59" step="1" inputmode="numeric" placeholder="π.χ. 30">
        </label>
      </div>

      <label>Μπαταρίες
        <input id="batteries" type="number" min="0" step="1" inputmode="numeric" placeholder="π.χ. 11">
      </label>

      <label>Σημείωση
        <input id="note" type="text" placeholder="π.χ. πρωινή βάρδια">
      </label>

      <div class="buttons">
        <button id="saveBtn" type="button">💾 Αποθήκευση</button>
        <button id="cancelBtn" class="secondary hidden" type="button">Άκυρο</button>
      </div>
      <p id="msg" class="msg"></p>
    </section>

    <section class="stats" id="stats"></section>

    <section class="card">
      <div class="row">
        <h2>Ιστορικό</h2>
        <button id="exportBtn" class="secondary" type="button">📥 CSV</button>
      </div>
      <input id="search" type="search" placeholder="Αναζήτηση σε ημερομηνία ή σημείωση">
      <div id="entries" class="entries"></div>
    </section>

    <section class="card danger-zone">
      <button id="clearBtn" class="danger" type="button">🗑️ Διαγραφή όλων</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
